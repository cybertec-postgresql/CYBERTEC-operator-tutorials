apiVersion: cpo.opensource.cybertec.at/v1
kind: postgresql
metadata:
  name: standby-cluster-1
spec:
  standby:
    standby_host: "cluster-1.cpo"
    standby_port: "5432"
  dockerImage: 'containers.cybertec.at/cybertec-pg-container/postgres:rocky9-18.1-1'
  numberOfInstances: 1
  postgresql:
    version: '18'
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  teamId: acid
  volume:
    size: 5Gi
    #storageClass: default-provisioner
