apiVersion: cpo.opensource.cybertec.at/v1
kind: postgresql
metadata:
  name: cluster-1
spec:
  dockerImage: 'containers.cybertec.at/cybertec-pg-container/postgres:rocky9-18.3-2'
  numberOfInstances: 1
  postgresql:
    version: '18'
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  teamId: acid
  volume:
    size: 5Gi
  backup:
    pgbackrest:
      configuration:
        secret: cluster-1-s3-credentials
      global:
        repo1-path: /YOUR_PATH_INSIDE_THE_BUCKET/repo1/
        repo1-retention-full: '7'
        repo1-retention-full-type: count
        #repo1-s3-uri-style: path # If you need path-style for your s3-storage
      image: 'containers.cybertec.at/cybertec-pg-container/pgbackrest:rocky9-18.3-2'
      repos:
        - endpoint: YOUR_S3_ENDPOINT
          name: repo1
          region: YOUR_S3_REGION
          resource: YOUR_BUCKET_NAME
          schedule:
            full: 30 2 * * *
          storage: s3