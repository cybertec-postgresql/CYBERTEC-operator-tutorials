apiVersion: cpo.opensource.cybertec.at/v1
kind: postgresql
metadata:
  name: cluster-1
spec:
  dockerImage: 'containers.cybertec.at/cybertec-pg-container/postgres:rocky9-18.3-2'
  numberOfInstances: 1
  postgresql:
    version: '18'
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  teamId: acid
  volume:
    size: 5Gi
  backup:
    pgbackrest:
      configuration:
        secret: cluster-1-pvc-configuration
      global:
        repo1-retention-full: '7'
        repo1-retention-full-type: count
      image: 'containers.cybertec.at/cybertec-pg-container/pgbackrest:rocky9-18.3-2'
      repos:
        - name: repo1
          schedule:
            full: 30 2 * * *
          storage: pvc
          volume:
            size: 10Gi
      restore:
        id: '1'
        options:
          type: 'immediate'
          set: '20231215-111802F'
        repo: 'repo1'